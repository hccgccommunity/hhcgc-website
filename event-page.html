<style>
:root {
  --bg:#fff9f1;--surface:#fff;--surface-soft:#fff6ea;
  --border:rgba(121,62,17,0.14);--text:#2c1b10;--muted:#6a5141;
  --saffron:#b55a18;--saffron-dark:#8d3e0d;--maroon:#7f2e16;
  --shadow:0 18px 45px rgba(93,43,14,0.10);--radius:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left,rgba(217,138,30,0.12),transparent 22%),radial-gradient(circle at top right,rgba(127,46,22,0.05),transparent 20%),var(--bg);color:var(--text);min-height:100vh;line-height:1.65;}
img{max-width:100%;display:block;}
a{color:inherit;text-decoration:none;}
.container{width:min(calc(100% - 32px),1100px);margin:0 auto;}
.site-header{position:sticky;top:0;z-index:50;background:rgba(255,249,241,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.nav{display:flex;align-items:center;justify-content:space-between;gap:24px;min-height:92px;padding:12px 0;}
.brand{display:flex;align-items:center;gap:16px;min-width:0;}
.brand-logo-wrap{background:#7f2e16;border-radius:18px;padding:8px;flex-shrink:0;}
.brand-logo{width:88px;height:auto;border-radius:12px;object-fit:contain;}
.brand-text h1{margin:0;font-size:1.2rem;line-height:1.15;color:var(--maroon);font-family:Georgia,serif;}
.site-header a.brand,.site-header a.brand:link,.site-header a.brand:visited{text-decoration:none;color:inherit;}
.site-header nav ul{list-style:none;display:flex;flex-wrap:wrap;gap:18px;margin:0;padding:0;align-items:center;justify-content:flex-end;}
.site-header nav a,.site-header nav a:link,.site-header nav a:visited{font-weight:700;color:var(--text);font-size:0.96rem;text-decoration:none;}
.site-header nav a:hover{color:var(--saffron-dark);}
.menu-toggle{display:none;border:0;background:transparent;padding:6px 0;cursor:pointer;color:#2c1b10;align-self:flex-end;}
.menu-toggle .bar{display:block;width:26px;height:2px;margin:5px 0;background:currentColor;}
@media(max-width:768px){.nav{flex-direction:column;align-items:stretch;gap:8px;}.menu-toggle{display:inline-block;}.site-header nav{display:none;width:100%;background:rgba(255,249,241,0.95);padding:10px 0;}.site-header nav.is-open{display:block;}.site-header nav ul{flex-direction:column;gap:14px;}}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid rgba(141,62,13,0.18);border-top-color:var(--saffron-dark);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.not-found{text-align:center;padding:80px 20px;color:var(--muted);}
.not-found h2{font-family:Georgia,serif;font-size:1.8rem;color:var(--maroon);margin-bottom:12px;}
.not-found a{color:var(--saffron-dark);}
#page-content{display:none;}
.page-hero{background:linear-gradient(135deg,var(--maroon) 0%,#4e1a09 100%);color:#fff;padding:60px 0 52px;text-align:center;}
.hero-kicker{display:inline-block;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.28);border-radius:20px;padding:4px 16px;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;margin-bottom:16px;}
.hero-title{font-family:Georgia,"Times New Roman",serif;font-size:clamp(2rem,5vw,3rem);font-weight:700;margin-bottom:10px;line-height:1.15;}
.hero-tagline{font-size:1.05rem;opacity:0.88;margin-bottom:18px;font-style:italic;}
.hero-desc{max-width:680px;margin:0 auto 28px;font-size:0.95rem;line-height:1.7;opacity:0.9;}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-hero-primary{background:#fff;color:var(--maroon);padding:0.75rem 1.75rem;border-radius:999px;font-weight:700;font-size:0.95rem;text-decoration:none;}
.btn-hero-primary:hover{opacity:0.9;}
.btn-hero-secondary{background:rgba(255,255,255,0.12);color:#fff;border:1.5px solid rgba(255,255,255,0.35);padding:0.75rem 1.75rem;border-radius:999px;font-weight:700;font-size:0.95rem;text-decoration:none;}
.info-strip{background:#fff;border-bottom:1px solid var(--border);padding:28px 0;}
.info-cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.info-card{display:flex;align-items:flex-start;gap:12px;min-width:180px;flex:1;}
.info-icon{font-size:1.5rem;flex-shrink:0;margin-top:2px;}
.info-card h4{font-size:0.72rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);font-weight:700;margin-bottom:4px;}
.info-card p{font-size:0.9rem;font-weight:700;color:var(--text);line-height:1.4;}
.info-card p small{display:block;font-size:0.78rem;font-weight:400;color:var(--muted);}
.section{padding:56px 0;}
.section-alt{background:var(--surface-soft);}
.section-label{display:inline-block;font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--saffron-dark);margin-bottom:8px;}
.section-title{font-family:Georgia,serif;font-size:clamp(1.5rem,3vw,2rem);color:var(--maroon);margin-bottom:18px;line-height:1.2;}
.prose{font-size:0.95rem;line-height:1.8;color:var(--text);max-width:720px;}
.prose p+p{margin-top:1em;}
.bullet-list{list-style:none;padding:0;margin-top:16px;}
.bullet-list li{padding:8px 0;border-bottom:1px dashed var(--border);font-size:0.9rem;color:var(--text);line-height:1.55;}
.bullet-list li:last-child{border-bottom:none;}
.bullet-list li::before{content:"✦ ";color:var(--saffron-dark);font-size:0.7rem;}
.people-grid{display:flex;flex-wrap:wrap;gap:20px;margin-top:24px;}
.person-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:1.4rem;text-align:center;flex:1;min-width:160px;max-width:200px;}
.person-avatar{width:80px;height:80px;border-radius:50%;background:var(--surface-soft);border:2px solid var(--border);margin:0 auto 12px;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1.8rem;}
.person-avatar img{width:100%;height:100%;object-fit:cover;}
.person-card h4{font-family:Georgia,serif;font-size:0.95rem;color:var(--maroon);margin-bottom:4px;}
.person-card p{font-size:0.78rem;color:var(--muted);line-height:1.4;}
.curriculum{display:flex;flex-direction:column;gap:16px;margin-top:24px;}
.curriculum-week{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.curriculum-week-header{background:var(--surface-soft);padding:12px 18px;display:flex;align-items:center;gap:12px;}
.week-badge{background:var(--maroon);color:#fff;border-radius:8px;padding:3px 10px;font-size:0.72rem;font-weight:800;text-transform:uppercase;white-space:nowrap;}
.curriculum-week-header h4{font-family:Georgia,serif;font-size:1rem;color:var(--maroon);}
.curriculum-week-body{padding:14px 18px;}
.curriculum-week-body p{font-size:0.85rem;color:var(--muted);line-height:1.6;}
.timeline{display:flex;flex-direction:column;gap:0;margin-top:20px;}
.timeline-item{display:flex;gap:20px;align-items:flex-start;padding:16px 0;border-bottom:1px dashed var(--border);}
.timeline-item:last-child{border-bottom:none;}
.timeline-time{font-size:0.82rem;font-weight:700;color:var(--saffron-dark);min-width:70px;padding-top:2px;}
.timeline-label{font-size:0.9rem;color:var(--text);font-weight:600;}
.timeline-label small{display:block;font-weight:400;color:var(--muted);font-size:0.78rem;margin-top:2px;}
.registration-section{padding:56px 0;}
.tickets-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:stretch;margin-top:24px;}
.tickets-flyer{display:flex;}
.tickets-flyer .flyer-frame{border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);position:sticky;top:110px;width:100%;}
.tickets-flyer .flyer-frame img{width:100%;height:100%;display:block;object-fit:cover;}
.embed-card{overflow:visible;background:transparent;border-radius:0;box-shadow:none;border:0;max-width:100%;margin:0;padding:0;}
.zeffy-responsive-frame{position:relative;overflow:hidden;height:0;width:100%;padding-top:1250px;background:transparent;}
.zeffy-responsive-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:transparent;display:block;overflow:hidden;}
.zeffy-fallback{padding:40px;text-align:center;color:var(--muted);font-size:0.9rem;border:1px dashed var(--border);border-radius:16px;}
.zeffy-fallback a{color:var(--saffron-dark);font-weight:700;}
.rsvp-soon{padding:32px;text-align:center;background:var(--surface-soft);border:1px solid var(--border);border-radius:16px;color:var(--saffron-dark);font-weight:700;font-size:1rem;}
@media(max-width:768px){.tickets-grid{grid-template-columns:1fr;}.info-cards{flex-direction:column;}.people-grid{justify-content:center;}}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TPBF5VKB" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div id="site-header"></div>

<div id="loading-state" class="loading-state">
  <div class="spinner"></div>
  <p>Loading&hellip;</p>
</div>

<div id="not-found" style="display:none;">
  <div class="not-found">
    <h2>Page Not Found</h2>
    <p>This page doesn&rsquo;t exist yet. <a href="/">Return to home</a>.</p>
  </div>
</div>

<div id="page-content"></div>
<div id="site-footer"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getFirestore, collection, query, where, getDocs, limit } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyA6IzLjWTg7Rq04HsTH-iA3eDmSzKI7xME',
  authDomain: 'hccgc-a7a54.firebaseapp.com',
  projectId: 'hccgc-a7a54',
  storageBucket: 'hccgc-a7a54.firebasestorage.app',
  messagingSenderId: '75757201418',
  appId: '1:75757201418:web:c31e9361921242145717f3'
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

function loadPartial(id, file) {
  var el = document.getElementById(id);
  if (!el) return;
  fetch(file).then(function(r){ return r.text(); }).then(function(html){ el.innerHTML = html; }).catch(function(){});
}
loadPartial('site-header', '/header.html');
loadPartial('site-footer', '/footer.html');

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return '';
  var p = d.split('-');
  if (p.length !== 3) return d;
  return new Date(+p[0], +p[1]-1, +p[2]).toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
}

function infoCard(icon, label, value, sub) {
  var html = '<div class="info-card">';
  html += '<div class="info-icon">' + icon + '</div>';
  html += '<div><h4>' + esc(label) + '</h4>';
  html += '<p>' + esc(value);
  if (sub) html += '<small>' + esc(sub) + '</small>';
  html += '</p></div></div>';
  return html;
}

var slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
if (!slug || slug === 'event-page') {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
} else {
  getDocs(query(collection(db, 'pages'), where('slug', '==', slug), limit(1))).then(function(snapshot) {
    document.getElementById('loading-state').style.display = 'none';
    if (snapshot.empty) { document.getElementById('not-found').style.display = 'block'; return; }
    var e = snapshot.docs[0].data();
    if (!e.pageEnabled) { document.getElementById('not-found').style.display = 'block'; return; }
    renderPage(e);
  }).catch(function(err) {
    console.error(err);
    document.getElementById('loading-state').innerHTML = '<p style="color:#c0392b">Could not load this page. Please try again later.</p>';
  });
}

function renderPage(e) {
  var isInit = e.type === 'initiative';
  var title = e.pageTitle || e.name || 'HCCGC Event';

  document.getElementById('page-title').textContent = title + ' | Hindu Community Center of Greater Cincinnati';
  document.getElementById('page-desc').setAttribute('content', e.metaDescription || e.tagline || e.heroDescription || '');

  // Info cards
  var cards = '';
  if (isInit) {
    var dateRange = fmtDate(e.startDate || e.date) + (e.endDate ? ' \u2013 ' + fmtDate(e.endDate) : '');
    cards += infoCard('\u{1F4C5}', 'Dates', dateRange, '');
    if (e.scheduleText) cards += infoCard('\u{1F5D3}', 'Schedule', e.scheduleText, '');
  } else {
    if (e.date) cards += infoCard('\u{1F4C5}', 'Date', fmtDate(e.date), '');
    if (e.fromTime) cards += infoCard('\u{1F550}', 'Time', e.fromTime + (e.toTime ? ' \u2013 ' + e.toTime : ''), '');
  }
  cards += infoCard('\u{1F4CD}', 'Venue', e.venue || 'HCCGC', '7500 Industrial Row Dr, Mason, OH 45040');
  if (e.contact && e.contact.name) cards += infoCard('\u{1F4DE}', 'Contact', e.contact.name, e.contact.phone || '');
  if (e.costDisplay || e.cost) cards += infoCard('\u{1F3AB}', 'Cost', e.costDisplay || e.cost, '');
  if (isInit && e.instructor && e.instructor.name) cards += infoCard('\u{1F9D1}\u200D\u{1F3EB}', 'Instructor', e.instructor.name, e.instructor.role || '');

  // Hero
  var heroHtml = '<section class="page-hero">';
  heroHtml += '<div class="container">';
  heroHtml += '<span class="hero-kicker">HCCGC ' + (isInit ? 'Initiative' : 'Presents') + '</span>';
  heroHtml += '<h1 class="hero-title">' + esc(title) + '</h1>';
  if (e.tagline) heroHtml += '<p class="hero-tagline">' + esc(e.tagline) + '</p>';
  if (e.heroDescription) heroHtml += '<p class="hero-desc">' + esc(e.heroDescription) + '</p>';
  heroHtml += '<div class="hero-actions">';
  heroHtml += e.zeffyUrl
    ? '<a class="btn-hero-primary" href="#join">Register Now</a>'
    : '<a class="btn-hero-primary" href="#about">Learn More</a>';
  heroHtml += '<a class="btn-hero-secondary" href="#about">About ' + (isInit ? 'the Initiative' : 'the Event') + '</a>';
  heroHtml += '</div></div></section>';

  // Info strip
  var infoHtml = '<div class="info-strip"><div class="container"><div class="info-cards">' + cards + '</div></div></div>';

  // About
  var aboutHtml = '<section class="section" id="about"><div class="container">';
  aboutHtml += '<span class="section-label">About ' + (isInit ? 'the Initiative' : 'the Event') + '</span>';
  aboutHtml += '<h2 class="section-title">' + esc(e.aboutTitle || title) + '</h2>';
  if (e.aboutBody) {
    var paras = e.aboutBody.split('\n').filter(function(p){ return p.trim(); });
    aboutHtml += '<div class="prose">' + paras.map(function(p){ return '<p>' + esc(p) + '</p>'; }).join('') + '</div>';
  }
  if (e.whatToExpect && e.whatToExpect.length) {
    aboutHtml += '<h3 style="font-family:Georgia,serif;font-size:1.1rem;color:var(--maroon);margin:28px 0 10px;">What to Expect</h3>';
    aboutHtml += '<ul class="bullet-list">' + e.whatToExpect.map(function(i){ return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>';
  }
  if (e.whoShouldAttend && e.whoShouldAttend.length) {
    aboutHtml += '<h3 style="font-family:Georgia,serif;font-size:1.1rem;color:var(--maroon);margin:28px 0 10px;">Who Should ' + (isInit ? 'Join' : 'Attend') + '</h3>';
    aboutHtml += '<ul class="bullet-list">' + e.whoShouldAttend.map(function(i){ return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>';
  }
  aboutHtml += '</div></section>';

  // Schedule (events)
  var scheduleHtml = '';
  if (!isInit && e.scheduleItems && e.scheduleItems.length) {
    scheduleHtml = '<section class="section"><div class="container">';
    scheduleHtml += '<span class="section-label">Schedule</span>';
    scheduleHtml += '<h2 class="section-title">Program Schedule</h2>';
    scheduleHtml += '<div class="timeline">';
    e.scheduleItems.forEach(function(s) {
      scheduleHtml += '<div class="timeline-item">';
      scheduleHtml += '<div class="timeline-time">' + esc(s.time) + '</div>';
      scheduleHtml += '<div class="timeline-label">' + esc(s.label);
      if (s.duration) scheduleHtml += '<small>' + esc(s.duration) + '</small>';
      scheduleHtml += '</div></div>';
    });
    scheduleHtml += '</div></div></section>';
  }

  // Performers (events)
  var performersHtml = '';
  if (!isInit && e.performers && e.performers.length) {
    performersHtml = '<section class="section section-alt"><div class="container">';
    performersHtml += '<span class="section-label">Performers</span>';
    performersHtml += '<h2 class="section-title">Meet the Artists</h2>';
    performersHtml += '<div class="people-grid">';
    e.performers.forEach(function(p) {
      performersHtml += '<div class="person-card">';
      performersHtml += '<div class="person-avatar">';
      performersHtml += p.photoUrl ? '<img src="' + esc(p.photoUrl) + '" alt="' + esc(p.name) + '">' : '\u{1F3B5}';
      performersHtml += '</div>';
      performersHtml += '<h4>' + esc(p.name) + '</h4>';
      performersHtml += '<p>' + esc(p.role || '') + (p.location ? '<small>' + esc(p.location) + '</small>' : '') + '</p>';
      performersHtml += '</div>';
    });
    performersHtml += '</div></div></section>';
  }

  // Instructor (initiatives)
  var instructorHtml = '';
  if (isInit && e.instructor && e.instructor.name) {
    instructorHtml = '<section class="section section-alt"><div class="container">';
    instructorHtml += '<span class="section-label">Your Guide</span>';
    instructorHtml += '<h2 class="section-title">Meet Your Instructor</h2>';
    instructorHtml += '<div class="people-grid"><div class="person-card">';
    instructorHtml += '<div class="person-avatar">';
    instructorHtml += e.instructor.photoUrl ? '<img src="' + esc(e.instructor.photoUrl) + '" alt="' + esc(e.instructor.name) + '">' : '\u{1F9D1}\u200D\u{1F3EB}';
    instructorHtml += '</div>';
    instructorHtml += '<h4>' + esc(e.instructor.name) + '</h4>';
    instructorHtml += '<p>' + esc(e.instructor.role || '') + '</p>';
    instructorHtml += '</div></div>';
    if (e.instructor.bio) instructorHtml += '<p class="prose" style="margin-top:20px;">' + esc(e.instructor.bio) + '</p>';
    instructorHtml += '</div></section>';
  }

  // Curriculum (initiatives)
  var curriculumHtml = '';
  if (isInit && e.curriculum && e.curriculum.length) {
    curriculumHtml = '<section class="section"><div class="container">';
    curriculumHtml += '<span class="section-label">Course Details</span>';
    curriculumHtml += '<h2 class="section-title">' + esc(e.curriculumTitle || 'Program Curriculum') + '</h2>';
    curriculumHtml += '<div class="curriculum">';
    e.curriculum.forEach(function(w) {
      curriculumHtml += '<div class="curriculum-week">';
      curriculumHtml += '<div class="curriculum-week-header">';
      curriculumHtml += '<span class="week-badge">' + esc(w.weekLabel || 'Week') + '</span>';
      curriculumHtml += '<h4>' + esc(w.title) + '</h4>';
      curriculumHtml += '</div>';
      curriculumHtml += '<div class="curriculum-week-body">';
      if (w.description) curriculumHtml += '<p>' + esc(w.description) + '</p>';
      curriculumHtml += '</div></div>';
    });
    curriculumHtml += '</div></div></section>';
  }

  // Registration — flyer left (sticky), Zeffy right
  var regHtml = '<section class="registration-section" id="join"><div class="container">';
  regHtml += '<span class="section-label">Registration</span>';
  regHtml += '<h2 class="section-title">Register' + (isInit ? '' : ' \u00B7 Reserve Your Spot') + '</h2>';
  if (e.registrationNote) regHtml += '<p class="prose" style="margin-bottom:20px;">' + esc(e.registrationNote) + '</p>';
  regHtml += '<div class="tickets-grid">';
  if (e.flyerImageUrl) {
    regHtml += '<div class="tickets-flyer"><div class="flyer-frame">';
    regHtml += '<img src="' + esc(e.flyerImageUrl) + '" alt="' + esc(title) + ' flyer">';
    regHtml += '</div></div>';
  }
  if (e.zeffyUrl) {
    regHtml += '<div class="embed-card" id="zeffy-container">';
    regHtml += '<div>';
    regHtml += '<div data-zeffy-embed data-form-url="' + esc(e.zeffyUrl.replace('https://www.zeffy.com','')) + '"></div>';
    regHtml += '<div data-zeffy-embed-fallback style="display:none;">';
    regHtml += '<div class="zeffy-responsive-frame">';
    regHtml += '<iframe title="' + esc(title) + ' registration" src="' + esc(e.zeffyUrl) + '" allowpaymentrequest allowtransparency="true" scrolling="no"></iframe>';
    regHtml += '</div></div>';
    regHtml += '</div></div>';
  } else {
    regHtml += '<div class="rsvp-soon">Registrations will open soon!</div>';
  }
  regHtml += '</div></div></section>';

  var content = document.getElementById('page-content');
  content.innerHTML = heroHtml + infoHtml + aboutHtml + scheduleHtml + performersHtml + instructorHtml + curriculumHtml + regHtml;
  content.style.display = 'block';
  document.getElementById('loading-state').style.display = 'none';

  // Inject Zeffy script dynamically after DOM is set
  if (e.zeffyUrl) {
    var s = document.createElement('script');
    s.src = 'https://www.zeffy.com/embed/v2/zeffy-embed.js';
    s.onerror = function() {
      var fallbacks = document.querySelectorAll('[data-zeffy-embed-fallback]');
      for (var i=0; i<fallbacks.length; i++) fallbacks[i].style.display = 'block';
    };
    content.appendChild(s);
  }
}
</script>
</body>
</html>
