<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Embedded Google Form</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff9f1;
      color: #2c1b10;
    }
    .container {
      max-width: 940px;
      margin: 40px auto;
      padding: 0 16px 24px;
    }
    .form-card {
      border-radius: 20px;
      overflow: hidden;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(121, 62, 17, 0.14);
      box-shadow: 0 12px 32px rgba(93, 43, 14, 0.12);
      padding: 12px;
    }
    iframe {
      width: 100%;
      height: 1400px;
      border: 0;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-card">
      <iframe
        src="https://docs.google.com/forms/d/1IbWJ1ZvHwXAwCB5p6qLMoTvzUoPIuIhje-uwZuKiC_0/viewform?embedded=true"
        frameborder="0"
        marginheight="0"
        marginwidth="0">
        Loading…
      </iframe>
    </div>
  </div>
</body>
</html>
