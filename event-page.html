<style>
:root {
  --maroon: #7f2e16;
  --saffron: #b55a18;
  --saffron-dark: #8d3e0d;
  --bg: #fff9f1;
  --surface: #ffffff;
  --surface-soft: #fff6ea;
  --border: rgba(121,62,17,0.14);
  --text: #2c1b10;
  --muted: #6a5141;
  --shadow: 0 18px 45px rgba(93,43,14,0.10);
  --radius: 22px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container { width: min(calc(100% - 32px), 1100px); margin: 0 auto; }

/* HEADER PARTIAL */
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255,249,241,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.nav {
  display: flex; align-items: center; justify-content: space-between;
  gap: 24px; min-height: 92px; padding: 12px 0;
}
.brand { display: flex; align-items: center; gap: 16px; min-width: 0; }
.brand-logo-wrap {
  background: #7f2e16; border-radius: 18px; padding: 8px; flex-shrink: 0;
}
.brand-logo { width: 88px; height: auto; border-radius: 12px; object-fit: contain; }
.brand-text h1 { margin: 0; font-size: 1.2rem; line-height: 1.15; color: var(--maroon); font-family: Georgia, serif; }
.site-header a.brand,
.site-header a.brand:link,
.site-header a.brand:visited { text-decoration: none; color: inherit; }
.site-header nav ul {
  list-style: none; display: flex; flex-wrap: wrap; gap: 18px;
  margin: 0; padding: 0; align-items: center; justify-content: flex-end;
}
.site-header nav a,
.site-header nav a:link,
.site-header nav a:visited { font-weight: 700; color: var(--text); font-size: 0.96rem; text-decoration: none; }
.site-header nav a:hover { color: var(--saffron-dark); }
.menu-toggle {
  display: none; border: 0; background: transparent;
  padding: 6px 0; cursor: pointer; color: #2c1b10; align-self: flex-end;
}
.menu-toggle .bar { display: block; width: 26px; height: 2px; margin: 5px 0; background: currentColor; }
@media (max-width: 768px) {
  .nav { flex-direction: column; align-items: stretch; gap: 8px; }
  .menu-toggle { display: inline-block; }
  .site-header nav { display: none; width: 100%; background: rgba(255,249,241,0.95); padding: 10px 0; }
  .site-header nav.is-open { display: block; }
  .site-header nav ul { flex-direction: column; gap: 14px; }
}

/* LOADING / ERROR STATES */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 16px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(141,62,13,0.18);
  border-top-color: var(--saffron-dark);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.not-found {
  text-align: center; padding: 80px 20px; color: var(--muted);
}
.not-found h2 {
  font-family: Georgia, serif; font-size: 1.8rem;
  color: var(--maroon); margin-bottom: 12px;
}
.not-found a { color: var(--saffron-dark); }

/* PAGE CONTENT */
#page-content { display: none; }

/* HERO */
.page-hero {
  background: linear-gradient(135deg, var(--maroon) 0%, #4e1a09 100%);
  color: #fff; padding: 60px 0 52px; text-align: center;
}
.hero-kicker {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 20px; padding: 4px 16px;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase; font-weight: 700; margin-bottom: 16px;
}
.hero-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: clamp(2rem, 5vw, 3rem); font-weight: 700;
  margin-bottom: 10px; line-height: 1.15;
}
.hero-tagline {
  font-size: 1.05rem; opacity: 0.88; margin-bottom: 18px; font-style: italic;
}
.hero-desc {
  max-width: 680px; margin: 0 auto 28px; font-size: 0.95rem;
  line-height: 1.7; opacity: 0.9;
}
.hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-hero-primary {
  background: #fff; color: var(--maroon);
  padding: 0.75rem 1.75rem; border-radius: 999px;
  font-weight: 700; font-size: 0.95rem; text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-hero-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }
.btn-hero-secondary {
  background: rgba(255,255,255,0.12); color: #fff;
  border: 1.5px solid rgba(255,255,255,0.35);
  padding: 0.75rem 1.75rem; border-radius: 999px;
  font-weight: 700; font-size: 0.95rem; text-decoration: none;
}
.btn-hero-secondary:hover { background: rgba(255,255,255,0.2); }

/* INFO CARDS */
.info-strip {
  background: #fff; border-bottom: 1px solid var(--border);
  padding: 28px 0;
}
.info-cards {
  display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
}
.info-card {
  display: flex; align-items: flex-start; gap: 12px;
  min-width: 180px; flex: 1;
}
.info-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
.info-card h4 {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--muted); font-weight: 700; margin-bottom: 4px;
}
.info-card p { font-size: 0.9rem; font-weight: 700; color: var(--text); line-height: 1.4; }
.info-card p small { display: block; font-size: 0.78rem; font-weight: 400; color: var(--muted); }

/* SECTIONS */
.section { padding: 56px 0; }
.section-alt { background: var(--surface-soft); }
.section-label {
  display: inline-block; font-size: 0.72rem; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--saffron-dark); margin-bottom: 8px;
}
.section-title {
  font-family: Georgia, serif; font-size: clamp(1.5rem, 3vw, 2rem);
  color: var(--maroon); margin-bottom: 18px; line-height: 1.2;
}
.prose { font-size: 0.95rem; line-height: 1.8; color: var(--text); max-width: 720px; }
.prose p + p { margin-top: 1em; }

/* LIST CARDS */
.list-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
.list-card {
  background: #fff; border: 1px solid var(--border); border-radius: 14px;
  padding: 1.25rem 1.4rem;
}
.list-card h4 { font-family: Georgia, serif; font-size: 1rem; color: var(--maroon); margin-bottom: 8px; }
.list-card ul { list-style: none; padding: 0; }
.list-card ul li {
  font-size: 0.85rem; color: var(--muted); padding: 4px 0;
  border-bottom: 1px dashed var(--border); line-height: 1.5;
}
.list-card ul li:last-child { border-bottom: none; }
.list-card ul li::before { content: "→ "; color: var(--saffron-dark); font-weight: 700; }

/* SIMPLE BULLET LIST */
.bullet-list { list-style: none; padding: 0; margin-top: 16px; }
.bullet-list li {
  padding: 8px 0; border-bottom: 1px dashed var(--border);
  font-size: 0.9rem; color: var(--text); line-height: 1.55;
}
.bullet-list li:last-child { border-bottom: none; }
.bullet-list li::before { content: "✦ "; color: var(--saffron-dark); font-size: 0.7rem; }

/* PERFORMERS / INSTRUCTOR */
.people-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 24px; }
.person-card {
  background: #fff; border: 1px solid var(--border); border-radius: 16px;
  padding: 1.4rem; text-align: center; flex: 1; min-width: 160px; max-width: 200px;
}
.person-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--surface-soft); border: 2px solid var(--border);
  margin: 0 auto 12px; overflow: hidden; display: flex;
  align-items: center; justify-content: center; color: var(--muted);
  font-size: 1.8rem;
}
.person-avatar img { width: 100%; height: 100%; object-fit: cover; }
.person-card h4 { font-family: Georgia, serif; font-size: 0.95rem; color: var(--maroon); margin-bottom: 4px; }
.person-card p { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }

/* CURRICULUM / PHASES */
.curriculum { display: flex; flex-direction: column; gap: 16px; margin-top: 24px; }
.curriculum-week {
  background: #fff; border: 1px solid var(--border); border-radius: 14px;
  overflow: hidden;
}
.curriculum-week-header {
  background: var(--surface-soft); padding: 12px 18px;
  display: flex; align-items: center; gap: 12px;
}
.week-badge {
  background: var(--maroon); color: #fff; border-radius: 8px;
  padding: 3px 10px; font-size: 0.72rem; font-weight: 800;
  text-transform: uppercase; white-space: nowrap;
}
.curriculum-week-header h4 { font-family: Georgia, serif; font-size: 1rem; color: var(--maroon); }
.curriculum-week-body { padding: 14px 18px; }
.curriculum-week-body p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
.curriculum-week-body ul { list-style: none; padding: 0; margin-top: 8px; }
.curriculum-week-body ul li { font-size: 0.82rem; color: var(--text); padding: 3px 0; }
.curriculum-week-body ul li::before { content: "· "; color: var(--saffron-dark); font-weight: 700; }

/* SCHEDULE TIMELINE */
.timeline { display: flex; flex-direction: column; gap: 0; margin-top: 20px; }
.timeline-item {
  display: flex; gap: 20px; align-items: flex-start; padding: 16px 0;
  border-bottom: 1px dashed var(--border);
}
.timeline-item:last-child { border-bottom: none; }
.timeline-time {
  font-size: 0.82rem; font-weight: 700; color: var(--saffron-dark);
  min-width: 70px; padding-top: 2px;
}
.timeline-label { font-size: 0.9rem; color: var(--text); font-weight: 600; }
.timeline-label small { display: block; font-weight: 400; color: var(--muted); font-size: 0.78rem; margin-top: 2px; }

/* FLYER + ZEFFY */
.registration-section { padding: 56px 0; }
.registration-inner {
  display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;
}
.flyer-wrap { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); }
.flyer-wrap img { width: 100%; display: block; }
.zeffy-wrap { border-radius: 16px; overflow: hidden; box-shadow: var(--shadow); background: #fff; }
.zeffy-wrap iframe { width: 100%; min-height: 540px; border: none; display: block; }
.zeffy-fallback {
  padding: 40px; text-align: center; color: var(--muted); font-size: 0.9rem;
}
.zeffy-fallback a { color: var(--saffron-dark); font-weight: 700; }

@media (max-width: 768px) {
  .registration-inner { grid-template-columns: 1fr; }
  .info-cards { flex-direction: column; }
  .people-grid { justify-content: center; }
}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TPBF5VKB" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<div id="site-header"></div>

<div id="loading-state" class="loading-state">
  <div class="spinner"></div>
  <p>Loading&hellip;</p>
</div>

<div id="not-found" style="display:none;">
  <div class="not-found">
    <h2>Page Not Found</h2>
    <p>This page doesn't exist yet. <a href="/">Return to home</a>.</p>
  </div>
</div>

<div id="page-content"></div>

<div id="site-footer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import {
  getFirestore, collection, query, where, getDocs, limit
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6IzLjWTg7Rq04HsTH-iA3eDmSzKI7xME",
  authDomain: "hccgc-a7a54.firebaseapp.com",
  projectId: "hccgc-a7a54",
  storageBucket: "hccgc-a7a54.firebasestorage.app",
  messagingSenderId: "75757201418",
  appId: "1:75757201418:web:c31e9361921242145717f3"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// Load header/footer
async function loadPartial(id, file) {
  const el = document.getElementById(id);
  if (!el) return;
  try {
    const r = await fetch(file);
    if (r.ok) el.innerHTML = await r.text();
  } catch (e) {}
}
loadPartial('site-header', '/header.html');
loadPartial('site-footer', '/footer.html');

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// Get the slug from the current URL path
const slug = window.location.pathname.replace(/^\//, '').replace(/\/$/, '') || null;

if (!slug || slug === 'event-page') {
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('not-found').style.display = 'block';
} else {
  // Query Firestore for a record with matching slug and pageEnabled: true
  const q = query(
    collection(db, 'events'),
    where('slug', '==', slug),
    where('pageEnabled', '==', true),
    limit(1)
  );

  try {
    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('not-found').style.display = 'block';
    } else {
      const e = snapshot.docs[0].data();
      renderPage(e);
    }
  } catch (err) {
    console.error(err);
    document.getElementById('loading-state').innerHTML =
      '<p style="color:#c0392b">Could not load this page. Please try again later.</p>';
  }
}

function renderPage(e) {
  const isInit = e.type === 'initiative';

  // Update page meta
  document.getElementById('page-title').textContent =
    escHtml(e.name) + ' | Hindu Community Center of Greater Cincinnati';
  document.getElementById('page-desc').setAttribute('content',
    e.metaDescription || e.tagline || e.heroDescription || '');

  // Build info cards
  let infoCards = '';
  if (isInit) {
    infoCards += infoCard('📅', 'Dates', formatDate(e.date) + (e.endDate ? ' – ' + formatDate(e.endDate) : ''), '');
    infoCards += infoCard('🗓️', 'Schedule', e.schedule || '', '');
  } else {
    infoCards += infoCard('📅', 'Date', formatDate(e.date), '');
    infoCards += infoCard('🕙', 'Time', (e.fromTime || '') + (e.toTime ? ' – ' + e.toTime : ''), '');
  }
  infoCards += infoCard('📍', 'Venue', e.venue || 'HCCGC', '7500 Industrial Row Dr, Mason, OH 45040');
  if (e.contact && e.contact.name) {
    infoCards += infoCard('📞', 'Contact', e.contact.name, e.contact.phone || '');
  }
  if (e.cost) {
    infoCards += infoCard('🎟️', 'Cost', e.cost, '');
  }
  if (isInit && e.instructor && e.instructor.name) {
    infoCards += infoCard('🧑‍🏫', isInit ? 'Guided by' : 'Instructor', e.instructor.name, e.instructor.role || '');
  }

  // Build what to expect / who should attend
  let expectHtml = '';
  if (e.whatToExpect && e.whatToExpect.length) {
    expectHtml = `
      <h3 style="font-family:Georgia,serif;font-size:1.1rem;color:var(--maroon);margin:28px 0 10px;">What to Expect</h3>
      <ul class="bullet-list">${e.whatToExpect.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>
    `;
  }
  let whoHtml = '';
  if (e.whoShouldAttend && e.whoShouldAttend.length) {
    whoHtml = `
      <h3 style="font-family:Georgia,serif;font-size:1.1rem;color:var(--maroon);margin:28px 0 10px;">Who Should ${isInit ? 'Join' : 'Attend'}</h3>
      <ul class="bullet-list">${e.whoShouldAttend.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>
    `;
  }

  // Performers (events only)
  let performersHtml = '';
  if (!isInit && e.performers && e.performers.length) {
    performersHtml = `
      <section class="section section-alt">
        <div class="container">
          <span class="section-label">Performers</span>
          <h2 class="section-title">Meet the Artists</h2>
          <div class="people-grid">
            ${e.performers.map(p => `
              <div class="person-card">
                <div class="person-avatar">
                  ${p.photoUrl ? `<img src="${escHtml(p.photoUrl)}" alt="${escHtml(p.name)}">` : '🎵'}
                </div>
                <h4>${escHtml(p.name)}</h4>
                <p>${escHtml(p.role || '')}<br><small>${escHtml(p.location || '')}</small></p>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  // Instructor (initiatives only)
  let instructorHtml = '';
  if (isInit && e.instructor && e.instructor.name) {
    instructorHtml = `
      <section class="section section-alt">
        <div class="container">
          <span class="section-label">Your Guide</span>
          <h2 class="section-title">Meet Your Instructor</h2>
          <div class="people-grid">
            <div class="person-card">
              <div class="person-avatar">
                ${e.instructor.photoUrl ? `<img src="${escHtml(e.instructor.photoUrl)}" alt="${escHtml(e.instructor.name)}">` : '🧑‍🏫'}
              </div>
              <h4>${escHtml(e.instructor.name)}</h4>
              <p>${escHtml(e.instructor.role || '')}</p>
            </div>
          </div>
          ${e.instructor.bio ? `<p class="prose" style="margin-top:20px;">${escHtml(e.instructor.bio)}</p>` : ''}
        </div>
      </section>
    `;
  }

  // Schedule (events only)
  let scheduleHtml = '';
  if (!isInit && e.scheduleItems && e.scheduleItems.length) {
    scheduleHtml = `
      <section class="section">
        <div class="container">
          <span class="section-label">Schedule</span>
          <h2 class="section-title">Program Schedule</h2>
          <div class="timeline">
            ${e.scheduleItems.map(s => `
              <div class="timeline-item">
                <div class="timeline-time">${escHtml(s.time)}</div>
                <div class="timeline-label">
                  ${escHtml(s.label)}
                  ${s.duration ? `<small>${escHtml(s.duration)}</small>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  // Curriculum (initiatives only)
  let curriculumHtml = '';
  if (isInit && e.curriculum && e.curriculum.length) {
    curriculumHtml = `
      <section class="section">
        <div class="container">
          <span class="section-label">Course Details</span>
          <h2 class="section-title">${escHtml(e.curriculumTitle || 'Program Curriculum')}</h2>
          <div class="curriculum">
            ${e.curriculum.map(w => `
              <div class="curriculum-week">
                <div class="curriculum-week-header">
                  <span class="week-badge">${escHtml(w.weekLabel || 'Week')}</span>
                  <h4>${escHtml(w.title)}</h4>
                </div>
                <div class="curriculum-week-body">
                  ${w.description ? `<p>${escHtml(w.description)}</p>` : ''}
                  ${w.topics && w.topics.length ? `<ul>${w.topics.map(t => `<li>${escHtml(t)}</li>`).join('')}</ul>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  // Flyer + Zeffy registration
  const zeffyHtml = e.zeffyUrl
    ? `<iframe src="${escHtml(e.zeffyUrl)}" allowtransparency="true" frameborder="0" scrolling="no" allow="payment"></iframe>`
    : `<div class="zeffy-fallback"><p>Registration coming soon.<br>Check back later or <a href="/">return home</a>.</p></div>`;

  const flyerHtml = e.flyerImageUrl
    ? `<div class="flyer-wrap"><img src="${escHtml(e.flyerImageUrl)}" alt="${escHtml(e.name)} flyer"></div>`
    : '';

  const registrationHtml = `
    <section class="registration-section" id="join">
      <div class="container">
        <span class="section-label">Registration</span>
        <h2 class="section-title">Register${isInit ? '' : ' · Reserve Your Spot'}</h2>
        ${e.registrationNote ? `<p class="prose" style="margin-bottom:28px;">${escHtml(e.registrationNote)}</p>` : ''}
        <div class="registration-inner ${flyerHtml ? '' : 'single-col'}">
          ${flyerHtml}
          <div class="zeffy-wrap">${zeffyHtml}</div>
        </div>
      </div>
    </section>
  `;

  const html = `
    <section class="page-hero">
      <div class="container">
        <span class="hero-kicker">HCCGC ${isInit ? 'Initiative' : 'Presents'}</span>
        <h1 class="hero-title">${escHtml(e.name)}</h1>
        ${e.tagline ? `<p class="hero-tagline">${escHtml(e.tagline)}</p>` : ''}
        ${e.heroDescription ? `<p class="hero-desc">${escHtml(e.heroDescription)}</p>` : ''}
        <div class="hero-actions">
          ${e.zeffyUrl ? `<a class="btn-hero-primary" href="#join">Register Now</a>` : `<a class="btn-hero-primary" href="#about">Learn More</a>`}
          <a class="btn-hero-secondary" href="#about">About ${isInit ? 'the Initiative' : 'the Event'}</a>
        </div>
      </div>
    </section>

    <div class="info-strip">
      <div class="container">
        <div class="info-cards">${infoCards}</div>
      </div>
    </div>

    <section class="section" id="about">
      <div class="container">
        <span class="section-label">About ${isInit ? 'the Initiative' : 'the Event'}</span>
        <h2 class="section-title">${escHtml(e.aboutTitle || e.name)}</h2>
        <div class="prose">${(e.aboutBody || '').split('\n').filter(Boolean).map(p => `<p>${escHtml(p)}</p>`).join('')}</div>
        ${expectHtml}
        ${whoHtml}
      </div>
    </section>

    ${scheduleHtml}
    ${performersHtml}
    ${instructorHtml}
    ${curriculumHtml}
    ${registrationHtml}
  `;

  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('page-content').style.display = 'block';
  document.getElementById('page-content').innerHTML = html;
}

function infoCard(icon, label, value, sub) {
  return `
    <div class="info-card">
      <div class="info-icon">${icon}</div>
      <div>
        <h4>${escHtml(label)}</h4>
        <p>${escHtml(value)}${sub ? `<small>${escHtml(sub)}</small>` : ''}</p>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
