<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Space - HCCGC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff9f1;
      color: #2c1b10;
    }
    .wrap {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 {
      margin: 0 0 16px;
    }
    .embed-card {
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 12px 32px rgba(93, 43, 14, 0.12);
      border: 1px solid rgba(121, 62, 17, 0.14);
      padding: 16px;
    }
    .embed-shell {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 900px;
      border-radius: 16px;
    }
    .embed-shell iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .note {
      margin-top: 12px;
      color: #6a5141;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Book a Space</h1>
    <div class="embed-card">
      <div class="embed-shell">
        <iframe
          title="Room booking"
          src="https://www.picktime.com/hccgccommunityspaces#book/services"
          allowtransparency="true">
        </iframe>
      </div>
      <div class="note">If the booking page does not load inside the frame, open the link directly in a browser tab.</div>
    </div>
  </div>
</body>
</html>
