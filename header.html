
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ONLY hamburger related changes */

.menu-toggle {
  display: none;
  border: 0;
  background: transparent;
  cursor: pointer;
}

.menu-toggle .bar {
  display: block;
  width: 24px;
  height: 2px;
  margin: 5px 0;
  background: currentColor;
  transition: 0.25s;
}

/* Mobile behavior */
@media (max-width: 768px) {

  .nav {
    flex-direction: column;
    align-items: stretch;
  }

  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
  }

  .menu-toggle {
    display: block;
  }

  nav {
    display: none;
    width: 100%;
    margin-top: 10px;
  }

  nav.open {
    display: block;
  }

  nav ul {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }
}

/* animation */
.menu-toggle.open .bar:nth-child(1) {
  transform: rotate(45deg) translate(5px, 5px);
}
.menu-toggle.open .bar:nth-child(2) {
  opacity: 0;
}
.menu-toggle.open .bar:nth-child(3) {
  transform: rotate(-45deg) translate(5px, -5px);
}

</style>
</head>

<body>

<header class="site-header">
  <div class="container nav">

    <div class="brand">
      <a href="index.html#home" style="display:flex; align-items:center; gap:12px;">
        <div class="brand-logo-wrap">
          <img class="brand-logo" src="hccgc-logo.jpeg">
        </div>
        <div class="brand-text">
          <h1>Hindu Community Center <br> Of Greater Cincinnati</h1>
        </div>
      </a>

      <!-- hamburger RIGHT SIDE -->
      <button class="menu-toggle" id="menuBtn">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>

    <nav id="menu">
      <ul>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#initiatives">Initiatives</a></li>
        <li><a href="index.html#booking">Facility Rental</a></li>
        <li><a href="Contact%20Us.html">Contact Us</a></li>
        <li><a href="index.html#build-together">Support Our Mission</a></li>
      </ul>
    </nav>

  </div>
</header>

<script>
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");

btn.addEventListener("click", () => {
  menu.classList.toggle("open");
  btn.classList.toggle("open");
});
</script>

</body>
</html>
