<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issue Reporting — HCCGC Admin Portal</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-F5ZHQ4CDR9"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-F5ZHQ4CDR9');</script>
<style>
:root {
  --bg: #fff9f1; --surface: #ffffff; --surface-soft: #fff6ea; --border: rgba(121,62,17,0.14);
  --text: #2c1b10; --muted: #6a5141; --saffron: #b55a18; --saffron-dark: #8d3e0d; --maroon: #7f2e16;
  --green: #2e7d4f; --green-bg: #e8f5ec; --red: #b3382c; --red-bg: #fbe9e7; --amber: #b5750a; --amber-bg: #fff3e0;
  --radius: 22px; --shadow: 0 18px 45px rgba(93,43,14,0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, Helvetica, sans-serif; background: radial-gradient(circle at top left, rgba(217,138,30,0.12), transparent 22%), radial-gradient(circle at top right, rgba(127,46,22,0.05), transparent 20%), var(--bg); color: var(--text); min-height: 100vh; }
.container { width: min(calc(100% - 32px), 1100px); margin: 0 auto; }
.site-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(255, 249, 241, 0.92); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
}
.nav { display: flex; align-items: center; justify-content: space-between; gap: 24px; min-height: 92px; padding: 12px 0; }
.site-header a.brand, .site-header a.brand:link, .site-header a.brand:visited { text-decoration: none; color: inherit; }
.brand { display: flex; align-items: center; gap: 16px; min-width: 0; }
.brand-logo-wrap { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 8px; box-shadow: var(--shadow); flex-shrink: 0; }
.brand-logo { width: 88px; height: auto; border-radius: 12px; object-fit: contain; }
.brand-text h1 { margin: 0; font-size: 1.2rem; line-height: 1.15; color: var(--maroon); }
.site-header nav ul { list-style: none; display: flex; flex-wrap: wrap; gap: 18px; margin: 0; padding: 0; align-items: center; justify-content: flex-end; }
.site-header nav a, .site-header nav a:link, .site-header nav a:visited { font-weight: 700; color: var(--text); font-size: 0.96rem; text-decoration: none; }
.site-header nav a:hover { color: var(--saffron-dark); }
.menu-toggle { display: none; border: 0; background: transparent; padding: 6px 0; cursor: pointer; color: #2c1b10; align-self: flex-end; }
.menu-toggle .bar { display: block; width: 26px; height: 2px; margin: 5px 0; background: currentColor; }
@media (max-width: 768px) {
  .nav { flex-direction: column; align-items: stretch; gap: 8px; } .menu-toggle { display: inline-block; }
  .site-header nav { display: none; width: 100%; background: rgba(255,249,241,0.95); padding: 10px 0; }
  .site-header nav.is-open { display: block; } .site-header nav ul { flex-direction: column; gap: 14px; }
}
.page-hero { padding: 28px 0 22px; background: linear-gradient(135deg, var(--maroon) 0%, #4e1a09 100%); color: #fff; }
.page-hero h1 { font-family: Georgia, "Times New Roman", serif; font-size: 1.9rem; color: #fff; margin-bottom: 6px; }
.page-hero p { color: #ffffff; opacity: 0.9; font-size: 0.92rem; max-width: 560px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.85); text-decoration: none; margin-bottom: 14px; }
.back-link:hover { color: #fff; text-decoration: underline; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; box-shadow: var(--shadow); margin-bottom: 20px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: 0.86rem; font-weight: 700; color: var(--text); }
.field input, .field select, .field textarea {
  font-family: inherit; font-size: 0.92rem; padding: 10px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; background: #fff; color: var(--text); width: 100%;
}
.field textarea { resize: vertical; min-height: 100px; }
.priority-options { display: flex; gap: 10px; flex-wrap: wrap; }
.priority-opt { flex: 1; min-width: 100px; text-align: center; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); cursor: pointer; font-size: 0.86rem; font-weight: 700; }
.priority-opt input { display: none; }
.priority-opt.low { color: var(--green); } .priority-opt.medium { color: var(--amber); }
.priority-opt.high { color: var(--saffron-dark); } .priority-opt.critical { color: var(--red); }
.priority-opt.selected.low { background: var(--green-bg); border-color: var(--green); }
.priority-opt.selected.medium { background: var(--amber-bg); border-color: var(--amber); }
.priority-opt.selected.high { background: var(--surface-soft); border-color: var(--saffron-dark); }
.priority-opt.selected.critical { background: var(--red-bg); border-color: var(--red); }

.file-upload-label {
  display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; border: 2px dashed var(--border);
  border-radius: 10px; cursor: pointer; font-size: 0.86rem; color: var(--muted); background: #fff;
}
.file-upload-label.has-file { border-color: var(--saffron-dark); color: var(--saffron-dark); font-weight: 700; }

.btn-primary {
  font-family: inherit; font-size: 0.95rem; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, var(--saffron-dark), var(--maroon)); border: none; border-radius: 12px;
  padding: 13px 22px; cursor: pointer; width: 100%; margin-top: 8px;
}
.btn-primary:disabled { opacity: 0.6; cursor: default; }
.btn-secondary {
  font-family: inherit; font-size: 0.86rem; font-weight: 700; color: var(--text);
  background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 14px; cursor: pointer;
}
.result-box { margin-top: 16px; border-radius: 12px; padding: 14px 16px; font-size: 0.88rem; line-height: 1.55; }
.result-box.success { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46,125,79,0.25); }
.result-box.error { background: var(--red-bg); color: var(--red); border: 1px solid rgba(179,56,44,0.25); }

.ticket-row { display: flex; align-items: center; gap: 14px; padding: 14px; border: 1.5px solid var(--border); border-radius: 14px; margin-bottom: 10px; cursor: pointer; background: #fff; }
.ticket-row:hover { background: var(--surface-soft); }
.priority-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.priority-dot.low { background: var(--green); } .priority-dot.medium { background: var(--amber); }
.priority-dot.high { background: var(--saffron-dark); } .priority-dot.critical { background: var(--red); }
.ticket-row .ticket-main { flex: 1; min-width: 0; }
.ticket-row .ticket-title { font-weight: 700; font-size: 0.92rem; }
.ticket-row .ticket-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.status-pill { font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
.status-pill.open { background: var(--amber-bg); color: var(--amber); }
.status-pill.resolved { background: var(--green-bg); color: var(--green); }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }

.modal-overlay { position: fixed; inset: 0; background: rgba(44,27,16,0.5); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
.modal-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); max-width: 600px; width: 95%; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 22px 26px; border-bottom: 1px solid var(--border); }
.modal-header h2 { font-family: Georgia, "Times New Roman", serif; font-size: 1.15rem; color: var(--maroon); }
.modal-close { background: none; border: none; font-size: 1.4rem; color: var(--muted); cursor: pointer; line-height: 1; }
.modal-body { padding: 22px 26px; max-height: 65vh; overflow-y: auto; }
.modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 18px 26px; border-top: 1px solid var(--border); }
.screenshot-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.screenshot-links a { font-size: 0.82rem; color: var(--saffron-dark); font-weight: 700; }

#gate{padding:60px 16px;display:flex;justify-content:center;}
.gate-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow);}
.gate-card h3{font-family:Georgia,serif;font-size:1.3rem;color:var(--maroon);margin-bottom:.5rem;}
.gate-card p{color:var(--muted);font-size:.88rem;line-height:1.6;}
.gate-card a{color:var(--saffron-dark);}
</style>
</head>
<body>
<div id="site-header"></div>

<div id="gate">
  <div class="gate-card">
    <h3>Checking access&hellip;</h3>
    <p>Please sign in from the <a href="/admin/admin-portal">Admin Portal</a> first.</p>
  </div>
</div>

<div id="app" style="display:none;">

<div class="page-hero">
  <div class="container">
    <a class="back-link" href="https://hccgc.org/admin/admin-portal">&larr; Back to apps</a>
    <h1>Issue Reporting</h1>
    <p>Report a problem, attach a screenshot, and hear back once it's resolved.</p>
  </div>
</div>

<div class="container" style="padding:24px 0 60px;">
  <div class="card">
    <h2 style="font-family:Georgia,serif;color:var(--maroon);margin-bottom:16px;">Report an issue</h2>
    <form id="issueForm">
      <div class="field"><label>Title <span style="color:var(--saffron-dark);">*</span></label><input type="text" id="if-title" placeholder="Short summary of the problem" required></div>
      <div class="field"><label>What happened? <span style="color:var(--saffron-dark);">*</span></label><textarea id="if-description" placeholder="Describe the behavior — what you did, what you expected, what actually happened." required></textarea></div>
      <div class="field">
        <label>Priority <span style="color:var(--saffron-dark);">*</span></label>
        <div class="priority-options" id="priority-options">
          <label class="priority-opt low" data-priority="low"><input type="radio" name="priority" value="low">Low</label>
          <label class="priority-opt medium selected" data-priority="medium"><input type="radio" name="priority" value="medium" checked>Medium</label>
          <label class="priority-opt high" data-priority="high"><input type="radio" name="priority" value="high">High</label>
          <label class="priority-opt critical" data-priority="critical"><input type="radio" name="priority" value="critical">Critical</label>
        </div>
      </div>
      <div class="field">
        <label>Screenshots (optional)</label>
        <label class="file-upload-label" id="upload-label">📎 Choose file(s)<input type="file" id="if-screenshots" accept="image/*" multiple style="display:none;"></label>
      </div>
      <button type="submit" class="btn-primary" id="if-submit-btn">Submit issue</button>
      <div class="result-box" id="if-result-box" style="display:none;"></div>
    </form>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 style="font-family:Georgia,serif;color:var(--maroon);" id="tickets-heading">My issues</h2>
      <button type="button" class="btn-secondary" id="btn-refresh-tickets">Refresh</button>
    </div>
    <div id="tickets-list"></div>
  </div>
</div>

</div>

<div class="modal-overlay" id="ticket-modal-overlay" style="display:none;">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="ticket-modal-title">Issue</h2>
      <button class="modal-close" id="btn-close-ticket-modal">&times;</button>
    </div>
    <div class="modal-body" id="ticket-modal-body"></div>
    <div class="modal-footer" id="ticket-modal-footer"></div>
  </div>
</div>

<div id="site-footer"></div>

<script>
const API_BASE = 'https://facility-rental-api-217911937447.us-central1.run.app';

async function authedFetch(url, options) {
  options = options || {};
  var user = window.__hccgcFirebaseUser;
  if (!user) throw new Error('Not signed in.');
  var token = await user.getIdToken();
  options.headers = Object.assign({}, options.headers, { 'Authorization': 'Bearer ' + token });
  return fetch(url, options);
}
function escHtml(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function formatDateTime(iso) { if (!iso) return '—'; var d = new Date(iso); return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ', ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }

// ── Priority selector ──
document.querySelectorAll('.priority-opt').forEach(function (opt) {
  opt.addEventListener('click', function () {
    document.querySelectorAll('.priority-opt').forEach(function (o) { o.classList.remove('selected'); });
    opt.classList.add('selected');
    opt.querySelector('input').checked = true;
  });
});

// ── File upload label ──
document.getElementById('if-screenshots').addEventListener('change', function (e) {
  var label = document.getElementById('upload-label');
  if (e.target.files.length) {
    label.classList.add('has-file');
    label.firstChild.textContent = '✓ ' + e.target.files.length + ' file(s) selected';
  } else {
    label.classList.remove('has-file');
    label.firstChild.textContent = '📎 Choose file(s)';
  }
});

function fileToBase64(file) {
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload = function () { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function showResult(message, type) {
  var box = document.getElementById('if-result-box');
  box.style.display = 'block';
  box.className = 'result-box ' + type;
  box.textContent = message;
}

document.getElementById('issueForm').addEventListener('submit', async function (e) {
  e.preventDefault();
  var btn = document.getElementById('if-submit-btn');
  var title = document.getElementById('if-title').value.trim();
  var description = document.getElementById('if-description').value.trim();
  var priority = document.querySelector('input[name="priority"]:checked').value;
  if (!title || !description) { showResult('Title and description are both required.', 'error'); return; }

  btn.disabled = true; btn.textContent = 'Submitting…';
  try {
    var files = Array.from(document.getElementById('if-screenshots').files);
    var screenshots = [];
    for (var i = 0; i < files.length; i++) {
      var base64 = await fileToBase64(files[i]);
      screenshots.push({ base64: base64, filename: files[i].name, mimeType: files[i].type });
    }
    var res = await authedFetch(API_BASE + '/issues', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, description: description, priority: priority, screenshots: screenshots })
    });
    var data = await res.json();
    if (!res.ok) {
      showResult((data.errors || [data.error || 'Something went wrong.']).join(' '), 'error');
    } else {
      showResult('Issue submitted — you\'ll get an email once it\'s resolved.', 'success');
      document.getElementById('issueForm').reset();
      document.querySelectorAll('.priority-opt').forEach(function (o) { o.classList.remove('selected'); });
      document.querySelector('.priority-opt.medium').classList.add('selected');
      document.getElementById('upload-label').classList.remove('has-file');
      document.getElementById('upload-label').firstChild.textContent = '📎 Choose file(s)';
      await loadTickets();
    }
  } catch (err) {
    showResult('Could not reach the server: ' + err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit issue';
  }
});

// ── Tickets list ──
let TICKETS = [];
window.IS_NILAJ = false;
document.getElementById('btn-refresh-tickets').addEventListener('click', loadTickets);
async function loadTickets() {
  var list = document.getElementById('tickets-list');
  list.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    var res = await authedFetch(API_BASE + '/issues');
    TICKETS = await res.json();
    if (!TICKETS.length) { list.innerHTML = '<div class="empty-state">' + (window.IS_NILAJ ? 'No issues reported yet.' : 'You haven\'t reported any issues yet.') + '</div>'; return; }
    list.innerHTML = TICKETS.map(function (t) {
      return '<div class="ticket-row" data-ticket-id="' + t.ticketId + '">' +
        '<span class="priority-dot ' + t.priority + '"></span>' +
        '<div class="ticket-main"><div class="ticket-title">' + escHtml(t.title) + '</div>' +
        '<div class="ticket-meta">' + (window.IS_NILAJ ? escHtml(t.reporterEmail) + ' \u00b7 ' : '') + formatDateTime(t.createdAt) + '</div></div>' +
        '<span class="status-pill ' + t.status + '">' + t.status + '</span>' +
      '</div>';
    }).join('');
  } catch (err) {
    list.innerHTML = '<div class="empty-state">Could not load: ' + escHtml(err.message) + '</div>';
  }
}
document.getElementById('tickets-list').addEventListener('click', function (e) {
  var row = e.target.closest('[data-ticket-id]');
  if (!row) return;
  openTicketModal(row.dataset.ticketId);
});

function screenshotLinksHtml(urls) {
  if (!urls || !urls.length) return '';
  return '<div class="screenshot-links">' + urls.map(function (u, i) { return '<a href="' + u + '" target="_blank" rel="noopener">📎 Screenshot ' + (i + 1) + '</a>'; }).join('') + '</div>';
}
function openTicketModal(ticketId) {
  var t = TICKETS.find(function (x) { return x.ticketId === ticketId; });
  if (!t) return;
  document.getElementById('ticket-modal-title').textContent = t.title;
  var html = '<div style="margin-bottom:14px;"><span class="priority-dot ' + t.priority + '" style="display:inline-block;"></span> <strong>' + t.priority.charAt(0).toUpperCase() + t.priority.slice(1) + ' priority</strong> \u00b7 <span class="status-pill ' + t.status + '">' + t.status + '</span></div>';
  if (window.IS_NILAJ) html += '<div style="font-size:0.82rem;color:var(--muted);margin-bottom:10px;">Reported by ' + escHtml(t.reporterEmail) + ' on ' + formatDateTime(t.createdAt) + '</div>';
  html += '<p style="white-space:pre-wrap;font-size:0.9rem;">' + escHtml(t.description) + '</p>';
  html += screenshotLinksHtml(t.screenshotUrls);
  if (t.status === 'resolved') {
    html += '<div class="card" style="margin-top:16px;background:var(--green-bg);box-shadow:none;">';
    html += '<div style="font-weight:700;color:var(--green);margin-bottom:8px;">Resolved ' + formatDateTime(t.resolvedAt) + '</div>';
    html += '<p style="white-space:pre-wrap;font-size:0.88rem;">' + escHtml(t.resolutionNotes || '') + '</p>';
    html += screenshotLinksHtml(t.resolutionScreenshotUrls);
    html += '</div>';
  } else if (window.IS_NILAJ) {
    html += '<div class="field" style="margin-top:16px;"><label>Resolution notes</label><textarea id="resolve-notes"></textarea></div>';
    html += '<div class="field"><label>Screenshots (optional)</label><label class="file-upload-label" id="resolve-upload-label">📎 Choose file(s)<input type="file" id="resolve-screenshots" accept="image/*" multiple style="display:none;"></label></div>';
  }
  document.getElementById('ticket-modal-body').innerHTML = html;

  var footer = document.getElementById('ticket-modal-footer');
  if (window.IS_NILAJ && t.status !== 'resolved') {
    footer.innerHTML = '<button type="button" class="btn-primary" id="btn-resolve-ticket" style="margin-top:0;">Mark resolved</button>';
    document.getElementById('resolve-screenshots').addEventListener('change', function (e) {
      var label = document.getElementById('resolve-upload-label');
      label.classList.toggle('has-file', e.target.files.length > 0);
      label.firstChild.textContent = e.target.files.length ? '✓ ' + e.target.files.length + ' file(s) selected' : '📎 Choose file(s)';
    });
    document.getElementById('btn-resolve-ticket').addEventListener('click', function () { resolveTicket(t.ticketId); });
  } else {
    footer.innerHTML = '';
  }
  document.getElementById('ticket-modal-overlay').style.display = 'flex';
}
async function resolveTicket(ticketId) {
  var notes = document.getElementById('resolve-notes').value.trim();
  if (!notes) { alert('Resolution notes are required.'); return; }
  var btn = document.getElementById('btn-resolve-ticket');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    var files = Array.from(document.getElementById('resolve-screenshots').files);
    var screenshots = [];
    for (var i = 0; i < files.length; i++) {
      var base64 = await fileToBase64(files[i]);
      screenshots.push({ base64: base64, filename: files[i].name, mimeType: files[i].type });
    }
    var res = await authedFetch(API_BASE + '/issues/' + encodeURIComponent(ticketId) + '/resolve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ resolutionNotes: notes, screenshots: screenshots })
    });
    var data = await res.json();
    if (!res.ok) { alert('Could not resolve: ' + ((data.errors || [data.error]).join(' ') || 'unknown error')); return; }
    document.getElementById('ticket-modal-overlay').style.display = 'none';
    await loadTickets();
  } catch (err) {
    alert('Could not reach the server: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Mark resolved';
  }
}
document.getElementById('btn-close-ticket-modal').addEventListener('click', function () {
  document.getElementById('ticket-modal-overlay').style.display = 'none';
});
document.getElementById('ticket-modal-overlay').addEventListener('click', function (e) {
  if (e.target === this) this.style.display = 'none';
});

function loadPartial(id, file) {
  var target = document.getElementById(id);
  if (!target) return;
  fetch(file).then(function (r) { return r.text(); }).then(function (html) {
    target.innerHTML = html;
    if (id === 'site-header') fixHeaderLinksForSubfolder(target);
  }).catch(function () {});
}
function fixHeaderLinksForSubfolder(headerEl) {
  var logo = headerEl.querySelector('.brand-logo');
  if (logo && logo.getAttribute('src') && !logo.getAttribute('src').startsWith('/') && !logo.getAttribute('src').startsWith('http')) {
    logo.setAttribute('src', '/' + logo.getAttribute('src'));
  }
  headerEl.querySelectorAll('a[href]').forEach(function (link) {
    var href = link.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('/') || href.startsWith('#')) return;
    link.setAttribute('href', '/' + href);
  });
}
loadPartial('site-header', '/header.html');
loadPartial('site-footer', '/footer.html');
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

var firebaseConfig = {
  apiKey: 'AIzaSyA6IzLjWTg7Rq04HsTH-iA3eDmSzKI7xME',
  authDomain: 'hccgc-a7a54.firebaseapp.com',
  projectId: 'hccgc-a7a54',
  storageBucket: 'hccgc-a7a54.firebasestorage.app',
  messagingSenderId: '75757201418',
  appId: '1:75757201418:web:c31e9361921242145717f3'
};

var ALLOWED_DOMAIN = 'hccgc.org';
var REQUIRED_APP_KEY = 'issue-reporting';
var PORTAL_URL = '/admin/admin-portal';

var fbApp = initializeApp(firebaseConfig);
var auth = getAuth(fbApp);
var db = getFirestore(fbApp);

function showGate(title, msg) {
  document.getElementById('gate').querySelector('h3').textContent = title;
  document.getElementById('gate').querySelector('p').innerHTML = msg;
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

onAuthStateChanged(auth, function(user) {
  if (!user) { showGate('Sign in required', 'Please sign in from the <a href="'+PORTAL_URL+'">Admin Portal</a> first.'); return; }
  var email = (user.email||'').toLowerCase();
  window.__hccgcCurrentUser = { email: email };
  window.__hccgcFirebaseUser = user;
  if (!email.endsWith('@'+ALLOWED_DOMAIN)) { showGate('Access denied', 'Please use an @'+ALLOWED_DOMAIN+' account.'); return; }
  getDoc(doc(db, 'portalUsers', email)).then(function(snap) {
    var data = snap.exists() ? snap.data() : {};
    if (!data.isAdmin && !(Array.isArray(data.allowedApps) && data.allowedApps.includes(REQUIRED_APP_KEY))) {
      showGate('Access not granted', "You don't have access to Issue Reporting. Ask an admin to grant it.");
      return;
    }
    window.IS_NILAJ = email === 'nilaj@hccgc.org';
    document.getElementById('tickets-heading').textContent = window.IS_NILAJ ? 'All issues' : 'My issues';
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadTickets();
  }).catch(function() { showGate('Error', 'Could not verify access. Please try again.'); });
});
</script>
</body>
</html>
