
<!DOCTYPE html>
<header class="site-header">
    <style>
        /* Mobile hamburger only */
        .menu-toggle {
            display: none;
            border: 0;
            background: transparent;
            padding: 6px 0;
            cursor: pointer;
            color: #2c1b10;
            align-self: flex-end;
        }

        .menu-toggle .bar {
            display: block;
            width: 26px;
            height: 2px;
            margin: 5px 0;
            background: currentColor;
            transition: transform 0.22s ease, opacity 0.22s ease;
        }

        .menu-toggle.is-open .bar:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .menu-toggle.is-open .bar:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.is-open .bar:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .brand {
                width: 100%;
            }

            .brand-logo {
                width: 74px;
            }

            .menu-toggle {
                display: inline-block;
                margin-top: 2px;
            }

            .site-header nav {
                display: none;
                width: 100%;
            }

            .site-header nav.is-open {
                display: block;
            }

            .site-header nav ul {
                flex-direction: column;
                align-items: flex-start;
                justify-content: flex-start;
                gap: 14px;
                padding-top: 4px;
            }
        }
    </style>

    <div class="container nav">
        <a class="brand" href="index.html#home">
            <div class="brand-logo-wrap">
                <img class="brand-logo" alt="Hindu Community Center Greater Cincinnati logo" src="hccgc-logo.jpeg" />
            </div>
            <div class="brand-text">
                <h1>Hindu Community Center <br> Of Greater Cincinnati</h1>
            </div>
        </a>

        <button
            class="menu-toggle"
            id="menuToggle"
            type="button"
            aria-label="Open navigation"
            aria-expanded="false"
            aria-controls="primaryNav"
            onclick="(function(btn){var nav=document.getElementById('primaryNav');if(!nav)return;var open=nav.classList.toggle('is-open');btn.classList.toggle('is-open',open);btn.setAttribute('aria-expanded',open?'true':'false');})(this)">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav id="primaryNav" aria-label="Primary navigation">
            <ul>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#initiatives">Initiatives</a></li>
                <li><a href="index.html#booking">Facility Rental</a></li>
                <li><a href="Contact%20Us.html">Contact Us</a></li>
                <li><a href="index.html#build-together">Support Our Mission</a></li>
            </ul>
        </nav>
    </div>
</header>
