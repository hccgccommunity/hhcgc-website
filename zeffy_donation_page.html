
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hindu Community Center Greater Cincinnati</title>

<style>
:root {
  --bg:#fff9f1;
  --border:rgba(121,62,17,0.14);
  --text:#2c1b10;
  --muted:#6a5141;
  --maroon:#7f2e16;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(217,138,30,0.12), transparent 22%),
    radial-gradient(circle at top right, rgba(127,46,22,0.05), transparent 20%),
    var(--bg);
}

.container{
  width:min(calc(100% - 32px),1220px);
  margin:0 auto;
}

/* KEEP HEADER SAME */
header{
  position:sticky;
  top:0;
  background:rgba(255,249,241,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

/* MAIN */
.page-section{padding:40px 0;}

.page-title{
  text-align:center;
  color:var(--maroon);
}

.page-copy{
  text-align:center;
  color:var(--muted);
  margin-bottom:20px;
}

/* KEY CHANGE: FULL BLEND */
.embed-card{
  background:transparent;
  border:none;
  box-shadow:none;
  padding:0;
}

.embed-frame{
  position:relative;
  width:100%;
  height:800px;
  overflow:hidden;
}

.embed-frame iframe{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:0;
  background:transparent;
  display:block;
}

/* KEEP FOOTER SAME */
footer{
  padding:30px 0;
}
</style>
</head>

<body>

<header></header>

<main>
<section class="page-section">
<div class="container">

<h1 class="page-title">Support Our Mission</h1>
<p class="page-copy">
Support the Hindu Community Center through your donation.
</p>

<div class="embed-card">
  <div class="embed-frame">
    <iframe src="https://www.zeffy.com/embed/donation-form/build-hcc-with-us"></iframe>
  </div>
</div>

</div>
</section>
</main>

<footer></footer>

</body>
</html>
