
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>HCCGC Footer</title>

<style>
:root {
  --border: rgba(121, 62, 17, 0.14);
  --text: #2c1b10;
  --muted: #6a5141;
  --saffron-dark: #8d3e0d;
  --maroon: #7f2e16;
}

.site-footer {
  padding: 28px 0 36px;
}

.footer-nav-wrap {
  border-top: 1px solid var(--border);
  padding-top: 24px;
}

.container {
  width: min(calc(100% - 32px), 1220px);
  margin: 0 auto;
}

.footer-top {
  display: grid;
  grid-template-columns: 1.2fr 1.1fr 1fr;
  column-gap: 56px;
  row-gap: 24px;
  align-items: start;
}

.footer-block {
  min-width: 0;
}

.footer-heading {
  margin: 0 0 12px;
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--maroon);
}

.footer-links-block {
  justify-self: start;
}

.footer-contact-block {
  justify-self: start;
}

.footer-social-block {
  justify-self: end;
}

.footer-nav ul {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex !important;
  flex-direction: column !important;
  align-items: flex-start !important;
  justify-content: flex-start !important;
  gap: 10px;
}

.footer-nav li {
  display: block !important;
  width: 100%;
}

.footer-nav a,
.footer-email-link {
  display: inline-block;
  color: var(--text);
  font-size: 0.8rem;
  font-weight: 500;
  text-decoration: none;
  line-height: 1.4;
  white-space: nowrap;
}

.footer-nav a:hover,
.footer-email-link:hover {
  color: var(--saffron-dark);
}

.footer-email-link {
  display: inline-block;
}

.social-icons {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: flex-start;
}

.social-icon {
  width: 42px;
  height: 42px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: #fff;
  border: 1px solid var(--border);
  box-shadow: 0 6px 18px rgba(93, 43, 14, 0.10);
}

.social-icon svg {
  width: 20px;
  height: 20px;
  display: block;
}

.footer-note {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.6;
}

.footer-note a {
  color: inherit;
  text-decoration: none;
}

.footer-note a:hover {
  color: var(--saffron-dark);
}

.footer-divider {
  margin: 0 10px;
}

@media (max-width: 900px) {
  .footer-top {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .footer-links-block,
  .footer-contact-block,
  .footer-social-block {
    justify-self: start;
  }
}
</style>
</head>
