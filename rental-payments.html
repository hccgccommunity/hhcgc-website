<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .payment-frame {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .payment-frame iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Mobile fix */
    @media (max-width: 768px) {
      .payment-frame {
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div class="payment-frame">
    <iframe
      title="Donation form powered by Zeffy"
      src="https://www.zeffy.com/embed/donation-form/facility-rental-payment-portal"
      allowpaymentrequest
      allowTransparency="true"
      scrolling="yes">
    </iframe>
  </div>
</body>
</html>
