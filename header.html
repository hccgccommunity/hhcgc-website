
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header - Mobile Hamburger Fixed</title>
  <style>
    /* Existing header styles preserved */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 249, 241, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(121, 62, 17, 0.14);
    }

    .container {
      width: min(calc(100% - 32px), 1220px);
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      min-height: 92px;
      padding: 12px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand-logo-wrap {
      background: #fff;
      border: 1px solid rgba(121, 62, 17, 0.14);
      border-radius: 18px;
      padding: 8px;
      box-shadow: 0 18px 45px rgba(93, 43, 14, 0.10);
      flex-shrink: 0;
    }

    .brand-logo {
      width: 88px;
      height: auto;
      border-radius: 12px;
      object-fit: contain;
      display: block;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1.2rem;
      line-height: 1.15;
      color: #7f2e16;
    }

    .site-header nav ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin: 0;
      padding: 0;
      align-items: center;
      justify-content: flex-end;
    }

    .site-header nav a {
      font-weight: 700;
      color: #2c1b10;
      font-size: 0.96rem;
      text-decoration: none;
    }

    .site-header nav a:hover {
      color: #8d3e0d;
    }

    /* Hamburger button */
    .menu-toggle {
      display: none;
      border: 0;
      background: transparent;
      padding: 6px 0;
      cursor: pointer;
      color: #2c1b10;
      align-self: flex-end;
    }

    .menu-toggle .bar {
      display: block;
      width: 26px;
      height: 2px;
      margin: 5px 0;
      background: currentColor;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }

    .menu-toggle.is-open .bar:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .menu-toggle.is-open .bar:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.is-open .bar:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Mobile only */
    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }

      .brand {
        width: 100%;
      }

      .brand-logo {
        width: 74px;
      }

      /* show hamburger BELOW the brand row, aligned right */
      .menu-toggle {
        display: inline-block;
        margin-top: 2px;
      }

      .site-header nav {
        display: none;
        width: 100%;
      }

      .site-header nav.is-open {
        display: block;
      }

      .site-header nav ul {
        flex-direction: column;
        align-items: flex-start;
        justify-content: flex-start;
        gap: 14px;
        padding-top: 4px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html#home">
        <div class="brand-logo-wrap">
          <img class="brand-logo" alt="Hindu Community Center Greater Cincinnati logo" src="hccgc-logo.jpeg" />
        </div>
        <div class="brand-text">
          <h1>Hindu Community Center <br> Of Greater Cincinnati</h1>
        </div>
      </a>

      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="primaryNav">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <nav id="primaryNav" aria-label="Primary navigation">
        <ul>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#initiatives">Initiatives</a></li>
          <li><a href="index.html#booking">Facility Rental</a></li>
          <li><a href="Contact%20Us.html">Contact Us</a></li>
          <li><a href="index.html#build-together">Support Our Mission</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <script>
    (function () {
      const toggle = document.getElementById("menuToggle");
      const nav = document.getElementById("primaryNav");

      if (!toggle || !nav) return;

      toggle.addEventListener("click", function () {
        const isOpen = nav.classList.toggle("is-open");
        toggle.classList.toggle("is-open", isOpen);
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      nav.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", function () {
          if (window.innerWidth <= 768) {
            nav.classList.remove("is-open");
            toggle.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
          }
        });
      });
    })();
  </script>
</body>
</html>
