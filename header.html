
<!DOCTYPE html>
<header class="site-header">
    <style>
        /* Header background stays same */
        .site-header {
            background: rgba(255, 249, 241, 0.92);
        }

        /* FIX: logo background now maroon instead of white */
        .brand-logo-wrap {
            background: #7f2e16; /* maroon */
            border: none;
            box-shadow: none;
        }

        /* Optional: slight padding adjustment for nicer look */
        .brand-logo {
            background: #7f2e16;
            border-radius: 8px;
        }

        /* Mobile hamburger only */
        .menu-toggle {
            display: none;
            border: 0;
            background: transparent;
            padding: 6px 0;
            cursor: pointer;
            color: #2c1b10;
            align-self: flex-end;
        }

        .menu-toggle .bar {
            display: block;
            width: 26px;
            height: 2px;
            margin: 5px 0;
            background: currentColor;
        }

        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .menu-toggle {
                display: inline-block;
            }

            .site-header nav {
                display: none;
                width: 100%;
                background: rgba(255, 249, 241, 0.95);
                padding: 10px 0;
            }

            .site-header nav.is-open {
                display: block;
            }

            .site-header nav ul {
                flex-direction: column;
                gap: 14px;
            }
        }
    </style>

    <div class="container nav">
        <a class="brand" href="index.html#home">
            <div class="brand-logo-wrap">
                <img class="brand-logo" alt="HCCGC logo" src="hccgc-logo.jpeg" />
            </div>
            <div class="brand-text">
                <h1>Hindu Community Center <br> Of Greater Cincinnati</h1>
            </div>
        </a>

        <button class="menu-toggle" id="menuToggle"
            onclick="(function(btn){var nav=document.getElementById('primaryNav');if(!nav)return;var open=nav.classList.toggle('is-open');})(this)">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <nav id="primaryNav">
            <ul>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#initiatives">Initiatives</a></li>
                <li><a href="index.html#booking">Facility Rental</a></li>
                <li><a href="Contact%20Us.html">Contact Us</a></li>
                <li><a href="index.html#build-together">Support Our Mission</a></li>
            </ul>
        </nav>
    </div>
</header>
